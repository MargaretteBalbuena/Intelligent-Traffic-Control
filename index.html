<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Intelligent Traffic Control</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link
		href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@400;500;700&display=swap"
		rel="stylesheet"
	/>
	<link rel="stylesheet" href="./style.css" />
</head>

<body>
	<div id="app"></div>
	<div id="traffic-overview" aria-hidden="true">
		<div class="road road-ns">
			<div class="lane-lines"></div>
			<span class="car ns-car down" style="--lane:-24px; --delay:-1.5s; --dur:12s;"></span>
			<span class="car ns-car down" style="--lane:-24px; --delay:-7.2s; --dur:11.5s;"></span>
			<span class="car ns-car up" style="--lane:24px; --delay:-3.8s; --dur:12.8s;"></span>
			<span class="car ns-car up" style="--lane:24px; --delay:-9.6s; --dur:11.9s;"></span>
		</div>

		<div class="road road-ew">
			<div class="lane-lines"></div>
			<span class="car ew-car right" style="--lane:-24px; --delay:-2.2s; --dur:10.8s;"></span>
			<span class="car ew-car right" style="--lane:-24px; --delay:-8.3s; --dur:11.1s;"></span>
			<span class="car ew-car left" style="--lane:24px; --delay:-4.9s; --dur:10.5s;"></span>
			<span class="car ew-car left" style="--lane:24px; --delay:-10.4s; --dur:11.4s;"></span>
		</div>

		<div class="intersection-core"></div>
	</div>

	<main class="dashboard-shell" id="dashboard-shell" aria-label="Intelligent Traffic Control Dashboard">
		<section class="panel panel-main" aria-label="Traffic Signals">
			<header class="panel-head">
				
				<h1>Intelligent Traffic Control</h1>
				<p class="copy">Manually switch directions.</p>
			</header>

			<div class="intersection-grid">
				<article class="signal-card" id="card-ns">
					<div class="signal-meta">
						<h2>North-South</h2>
						<span class="state-pill" id="pill-ns">GREEN</span>
					</div>
					<div class="signal-rig">
						<div class="traffic-light" aria-label="North-South traffic light">
							<div class="light-bulb" id="ns-red"></div>
							<div class="light-bulb" id="ns-yellow"></div>
							<div class="light-bulb" id="ns-green"></div>
						</div>
						<div class="signal-stand" aria-hidden="true">
							<div class="stand-pole"></div>
							<div class="stand-base"></div>
						</div>
					</div>
				</article>

				<article class="signal-card" id="card-ew">
					<div class="signal-meta">
						<h2>East-West</h2>
						<span class="state-pill" id="pill-ew">RED</span>
					</div>
					<div class="signal-rig">
						<div class="traffic-light" aria-label="East-West traffic light">
							<div class="light-bulb" id="ew-red"></div>
							<div class="light-bulb" id="ew-yellow"></div>
							<div class="light-bulb" id="ew-green"></div>
						</div>
						<div class="signal-stand" aria-hidden="true">
							<div class="stand-pole"></div>
							<div class="stand-base"></div>
						</div>
					</div>
				</article>
			</div>

			<div class="controls-row">
				<button id="btn-switch" class="action-btn" type="button">Switch Direction</button>
				<button id="btn-toggle-logs" class="action-btn action-btn-subtle" type="button" aria-controls="panel-log" aria-expanded="true">Hide Logs</button>
			</div>
		</section>

		<aside class="panel panel-log" id="panel-log" aria-label="System Logs">
			<div class="log-head">
				<h2>System Logs</h2>
				<span class="chip" id="chip-mode">MANUAL</span>
			</div>
			<div class="log-body" id="log-body" role="log" aria-live="polite"></div>
		</aside>
	</main>

	<script type="module" src="./script.js"></script>
</body>

</html>
